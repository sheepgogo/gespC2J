const KP = {"code_read": {"name": "程序阅读与代码填空", "explain": "程序阅读题考查你像计算机一样“人肉执行”代码的能力。拿到一段程序，不要急着猜答案，而是一步一步走：准备好变量表，从 main 的第一行开始，遇到顺序就照做，遇到 if 就判断条件真假再决定走哪边，遇到 for、while 就重复做。填空类题目则反过来：先看这段程序想干什么（比如打印图形、统计个数），再推断横线处缺的是循环变量怎么变、还是条件怎么写。多画几遍变量的变化过程，答案自然浮现。"}, "loop": {"name": "循环结构", "explain": "循环就像一个不知疲倦的跑步机：只要条件成立，就一遍遍地做同一件事。for 循环适合“已知跑多少圈”（如 for(i=1;i<=n;i++)），while 循环适合“跑到条件不满足为止”（如读入到负数停止）。新手最易踩的坑：循环变量忘了自增导致死循环；边界写错（i<=n 还是 i<n）导致多算或少算一次。把循环想成“重复做 N 次同一动作”，并在脑中模拟前两圈和最后一圈，基本不会出错。"}, "branch": {"name": "分支结构", "explain": "分支是程序的“十字路口”。if 判断条件为真就走 if 块，否则走 else 块；多个互斥条件用 else if 串起来，像一级级开关。常见陷阱：把赋值 = 写成判断 ==；用连续比较 a<=x<=b（C++ 不支持，要写成 a<=x && x<=b）；还有 if 和 else 的配对（else 总是和最靠近它的那个 if 配对）。画个流程图，把每条路径的条件标清楚，逻辑就一目了然。"}, "operators": {"name": "运算符与表达式", "explain": "运算符是让数据“动起来”的指令。算术（+ - * / %）里要特别注意：两个整数相除结果还是整数（5/2 得 2，舍弃小数），想保留小数要写成 5/2.0；取模 % 只对整数有意义，结果符号同被除数。关系运算符（> < == !=）结果是 true 或 false。逻辑运算符 &&（且）、||（或）、!（非）用于组合条件。优先级口诀：算术 大于 关系 大于 逻辑 大于 赋值。拿不准就加括号，既安全又清晰。"}, "oop": {"name": "类与对象", "explain": "类（class）是“图纸”，对象（object）是按图纸造出的“房子”。图纸规定了有哪些属性（成员变量，如学生的姓名、年龄）和能做什么（成员函数，如计算总分）。封装把数据和保护它的方法包在一起，外界通过公开的接口来使用，看不见内部细节——就像你开车只需踩油门，不必懂发动机原理。同一个类可以创建出无数对象，各自保存自己的数据，互不干扰。掌握类与对象，是写出大程序的第一步。"}, "computer_hw": {"name": "计算机硬件与存储", "explain": "计算机由运算器、控制器、存储器、输入、输出五大部件组成（冯·诺依曼体系）。存储器分内存（RAM，断电丢失、速度快）和外存（硬盘、U盘、光盘，断电不丢、速度慢）。强磁场会破坏硬盘的磁记录，但光盘靠凹凸坑记录不受影响，U盘（闪存）也不怕磁场。CPU 是大脑，主频越高算得越快；内存容量常用 GB 衡量，1GB 等于 1024MB。理解“什么东西放哪里、丢了没有”，能解释很多生活现象。"}, "variables": {"name": "变量与数据类型", "explain": "变量是内存里一个有名字的“盒子”，用来装数据。不同“盒子”装不同种类：int 装整数，char 装单个字符，bool 装真或假，double、float 装小数。char 本质是整数（存字符的 ASCII 码，如 A 等于 65），所以能做 'a'+1 这样的运算。各类型占的字节数和取值范围不同：int 通常 4 字节、约正负 21 亿；char 1 字节、256 种。定义变量必须指定类型，且名字要合法（字母或下划线开头，不能用关键字）。选对类型，既省空间又不出错。"}, "cpp_struct": {"name": "C++ 程序基本结构", "explain": "一个最小的 C++ 程序长这样：先用 #include <iostream> 把输入输出功能“请”进来，再用 using namespace std; 省去每次写 std::，然后 int main(){ ... return 0; } 是程序入口，所有代码从这里开始执行，return 0 表示正常结束。cout<< 负责输出（<< 是流向屏幕），cin>> 负责输入。注释 // 和 /* */ 是给人看的，计算机忽略。记住“头文件—命名空间—main—输入输出”这条主线，你就能读懂绝大多数小程序。"}, "cs_fact": {"name": "计算机常识与网络", "explain": "这一类考查课堂之外的计算机通识：互联网（Internet）是全球互联的网络，不属于任何单一国家；域名像门牌号，如 gesp.ccf.org.cn 中 org.cn 是机构和国家的后缀；高级语言（如 C++、Python）贴近人话、需要编译成机器语言才能运行；超级计算机（如神威·太湖之光）用于气象、核能等海量计算。这些知识重在平时积累，考前翻一遍就能拿分。"}, "number_sys": {"name": "进制与编码", "explain": "进制就是“满几进一”。十进制满 10 进 1，二进制满 2 进 1（只用 0 和 1），八进制满 8，十六进制满 16（用 A 到 F 表示 10 到 15）。计算机底层只用二进制，因为它用电平的高低表示 0 和 1 最可靠。字符不能直接存，要靠编码表：ASCII 用 7 位二进制表示一个英文字符（A 等于 65）。学习进制转换就像学换一种数数方式，掌握“除以基数取余”（十进制转其他）和“按权展开”（其他转十进制）两招即可。"}, "flowchart": {"name": "流程图与程序结构", "explain": "流程图是用图形表示的“做菜步骤”：圆角矩形是开始或结束，平行四边形是输入或输出，矩形是处理，菱形是判断（有是、否两个出口）。三种基本结构——顺序（一条道走到黑）、分支（遇到岔路选一条）、循环（绕圈重复）——能拼出任何程序。读懂流程图，就能把一个复杂问题拆解成清晰的步骤，这也是编程前最重要的“想清楚”环节。"}, "function": {"name": "函数", "explain": "函数是一段“起了名字、能重复使用的代码”。定义时写清楚参数（接收什么数据）和返回值（算出什么交回来）；调用时把实参传进去，拿到结果。它让程序模块化：同样的计算（如求最大值）写一次，处处可调用，既省事又不易错。参数有传值和传引用之分，前者改副本不影响外面，后者直接改原变量。把函数想成“一台加工机器”：投料（参数）进去，产品（返回值）出来。"}, "identifier": {"name": "标识符与关键字", "explain": "标识符是你给变量、函数起的“名字”，规则是：只能由字母、数字、下划线组成，且必须以字母或下划线开头，不能用数字开头，也不能和关键字（如 int、if、while、return）撞车。关键字是 C++ 保留的“系统指令”，有固定含义，你不能拿它当变量名。好的命名见名知意（如 sum、count），既方便自己也方便别人读代码。"}, "debug": {"name": "调试、编译与运行", "explain": "写好的代码要经历编辑、编译、运行。编译阶段查语法错误（少分号、括号不匹配等），链接阶段找找不到的函数，运行阶段才可能暴露逻辑错误（答案不对但能跑）。调试就是当“侦探”：在可疑处用 cout 打印中间变量，或借助断点一步步看变量怎么变，定位“程序以为对的、其实错的地方”。养成编译零警告、运行对样例的习惯，bug 自然变少。"}, "prime_factor": {"name": "质数、因子与数论", "explain": "质数（素数）是只能被 1 和自身整除的大于 1 的整数（2、3、5、7 等）；因子是能整除某数的数。判断 n 是否为质数，只需用 2 到 根号n 之间的整数去试除，有一个能整除就不是质数——这比试到 n-1 快得多。最大公约数 gcd、最小公倍数 lcm 也是常客。这类题的核心是“枚举加判断”，注意边界（如 1 不是质数）和效率（缩小试除范围）。"}, "incdec": {"name": "自增与自减", "explain": "++ 和 -- 让变量自加 1 或自减 1，有前置和后置之分：++a 是“先加后用”（先把 a 加 1，再用新值），a++ 是“先用后加”（先拿 a 的当前值用，再加 1）。例如 int a=5; int b=++a; 之后 a、b 都是 6；而 int b=a++; 之后 b=5、a=6。它们常出现在循环里更新计数器。记住口诀：符号在前先变后用，符号在后先用再变。"}, "history": {"name": "计算机发展史与人物", "explain": "世界上第一台通用电子计算机 ENIAC（1946 年，美国）用电子管；随后晶体管取代电子管，再到集成电路、大规模集成电路，体积越来越小、速度越来越快。图灵提出了“图灵机”理论模型，冯·诺依曼确立了“存储程序”体系（程序和数据都放内存、顺序执行），至今仍是计算机的基础。了解这些，能明白今天的手机能装进口袋是几代人积累的结果。"}, "pointer": {"name": "指针", "explain": "指针是“存地址的变量”。普通变量存数据，指针变量存的是“另一个变量在内存里的门牌号（地址）”。通过 * 可以顺着地址找到并操作那个数据（解引用）。指针强大也危险：用错地址会乱改别处内存。它常用来让函数修改外部变量、或高效处理数组。把指针想成“快递柜取件码”：码本身不是包裹，但凭码能找到包裹。"}, "string": {"name": "字符串与字符", "explain": "字符串是一串字符组成的文本（如 hello），在 C++ 里常用字符数组或 string 类表示。字符 char 是单个字母或符号，字符串是它们的排队序列，结尾用 \\0 标记结束。常见操作：求长度、取子串、比较大小（按字典序，像查字典那样逐个字母比）。处理字符串题常要逐个字符扫描，注意下标从 0 开始、别越界。"}, "complexity": {"name": "算法复杂度", "explain": "复杂度衡量算法随数据量增大的“吃资源”程度。时间复杂度看基本操作执行次数（如遍历 n 个数约 n 次，记作 O(n)），空间复杂度看额外用了多少内存。O(1) 最快，O(n) 不错，O(n 的平方)（如双重循环）在数据大时会很慢。比较算法就像比较两种搬砖方案谁更省力——追求用更少的步骤办成事。"}, "simulation": {"name": "模拟与经典数学问题", "explain": "模拟题不考高深算法，而是考“能不能把题目描述的过程忠实地翻译成代码”：百钱百鸡、数字黑洞 495、斐波那契数列、闰年判断、回文数等。做法就是老老实实按题意一步步写：用循环枚举、用条件判断、用变量累加。关键在于先想清楚“人怎么算”，再原样写成程序，别跳步也别多想。"}};
const exams = DATA.exams.slice().sort((a,b)=>a.date.localeCompare(b.date));
const examsById = {}; exams.forEach(e=>examsById[e.id]=e);

function kpName(id){ return (KP[id]&&KP[id].name)?KP[id].name:id; }
function kpExplain(id){ return (KP[id]&&KP[id].explain)?KP[id].explain:""; }
function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function kpCounts(){
  const c = {};
  exams.forEach(e=>e.sections.forEach(s=>s.questions.forEach(q=>{ c[q.kp]=(c[q.kp]||0)+1; })));
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}

function buildSidebar(){
  let h = '<div class="nav-group"><div class="nav-title">按试卷浏览（共 '+exams.length+' 套）</div>';
  exams.forEach(e=>{ h += '<button class="nav-item" id="nav-'+e.id+'" onclick="showExam(\''+e.id+'\')">'+e.id+'（'+e.date+' · '+e.level+'级）</button>'; });
  h += '</div><div class="nav-group"><div class="nav-title">按知识点汇总</div>';
  kpCounts().forEach(([id,c])=>{
    h += '<button class="nav-item" id="navkp-'+id+'" onclick="showKP(\''+id+'\')">'+esc(kpName(id))+' <span class="cnt">'+c+'</span></button>';
  });
  h += '</div>';
  document.getElementById('sidebar').innerHTML = h;
}

function setActive(sel){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(sel) document.getElementById(sel).classList.add('active');
}

function qCard(ex, sec, q){
  const tl = sec.type==='single'?'单选':sec.type==='tf'?'判断':(sec.type==='program'?'编程':'题');
  const head = '<div class="q-head"><span class="badge '+sec.type+'">'+tl+'</span>'
    + '<span class="q-src">'+ex.id+' · 第'+q.num+'题</span>'
    + '<span class="tag kp">'+esc(kpName(q.kp))+'</span></div>';
  if(sec.type==='program'){
    return '<div class="q">'+head+'<pre class="prog">'+esc(q.stem)+'</pre></div>';
  }
  let body = '<div class="stem">'+esc(q.stem)+'</div>';
  let opts = (sec.type==='tf') ? [{'key':'√','text':'正确'},{'key':'×','text':'错误'}] : q.options;
  body += '<div class="options">';
  opts.forEach(o=>{
    const corr = (o.key===q.answer)?' correct':'';
    const cls = (o.key===q.answer)?'opt correct':'opt';
    body += '<div class="'+cls+'">'+esc(o.key)+'. '+esc(o.text)+'</div>';
  });
  body += '</div>';
  if(sec.type==='tf'){
    body += '<div class="tf-note">判断题（请判断正误，点击显示答案）</div>';
  }
  const ansText = (sec.type==='single') ? ('正确答案：'+q.answer) : ('正确答案：'+(q.answer==='√'?'√ 正确':'× 错误'));
  const ansLabel = (sec.type==='single') ? q.answer : (q.answer==='√'?'√（正确）':'×（错误）');
  body += '<button class="btn-answer" onclick="this.parentNode.classList.add(\'show-ans\')">显示答案</button>';
  body += '<div class="answer">'+esc(ansText)+'</div>';
  const anal = '【正确答案】'+ansLabel+'。\n【考查知识点】'+kpName(q.kp)+'。\n【详细解析】'+kpExplain(q.kp);
  body += '<button class="btn-analysis" onclick="this.parentNode.classList.toggle(\'show-anal\')">查看详细解析</button>';
  body += '<div class="analysis">'+esc(anal)+'</div>';
  return '<div class="q" data-kp="'+q.kp+'">'+head+body+'</div>';
}

function showExam(id){
  setActive('nav-'+id);
  const ex = examsById[id];
  let h = '<div class="panel"><h2>'+id+' · GESP C++ '+ex.level+'级 （'+ex.date+'）</h2>';
  h += '<div class="sub">本套试卷按知识点分布如下，点击任一标签可查看该知识点在所有试卷中的汇总。</div>';
  const cnt = {};
  ex.sections.forEach(s=>s.questions.forEach(q=>{ cnt[q.kp]=(cnt[q.kp]||0)+1; }));
  h += '<div class="summary">';
  Object.keys(cnt).forEach(k=>{ h += '<span class="chip" onclick="showKP(\''+k+'\')">'+esc(kpName(k))+' <b>'+cnt[k]+'</b></span>'; });
  h += '</div>';
  ex.sections.forEach(s=> s.questions.forEach(q=> h += qCard(ex,s,q)));
  h += '</div>';
  document.getElementById('main').innerHTML = h;
  window.scrollTo(0,0);
}

function showKP(id){
  setActive('navkp-'+id);
  let total = 0;
  exams.forEach(e=>e.sections.forEach(s=>s.questions.forEach(q=>{ if(q.kp===id) total++; })));
  let h = '<div class="panel"><h2>'+esc(kpName(id))+'（跨试卷共 '+total+' 题）</h2>';
  h += '<div class="sub">以下为所有试卷中考查该知识点的题目汇总。</div>';
  h += '<div class="kp-explain"><span class="tag">知识点讲解</span>'+esc(kpExplain(id))+'</div>';
  exams.forEach(e=> e.sections.forEach(s=> s.questions.forEach(q=>{ if(q.kp===id) h += qCard(e,s,q); })));
  h += '</div>';
  document.getElementById('main').innerHTML = h;
  window.scrollTo(0,0);
}

function onSearch(v){
  v = v.trim();
  if(!v){ showHome(); return; }
  setActive(null);
  let h = '<div class="panel"><h2>搜索：“'+esc(v)+'”</h2><div class="sub">匹配题干或选项的题目如下。</div>';
  let n = 0;
  exams.forEach(e=> e.sections.forEach(s=> s.questions.forEach(q=>{
    const blob = q.stem + ' ' + q.options.map(o=>o.text).join(' ') + ' ' + q.answer;
    if(blob.toLowerCase().indexOf(v.toLowerCase())>=0){ h += qCard(e,s,q); n++; }
  })));
  if(n===0) h += '<div class="tip">没有找到匹配的题目，试试“循环”“质数”“指针”“数组”等关键词。</div>';
  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

function showHome(){
  setActive(null);
  let totalQ = 0; exams.forEach(e=>e.sections.forEach(s=>totalQ+=s.questions.length));
  let h = '<div class="panel"><h2>欢迎使用 GESP C++ 真题知识点学习站</h2>';
  h += '<div class="sub">收录 '+exams.length+' 套 GESP C++ 历年真题（'+exams[0].date+' 至 '+exams[exams.length-1].date+'），共 '+totalQ+' 道题。</div>';
  h += '<div class="tip">使用方式：左侧“按试卷浏览”逐套刷题；“按知识点汇总”把分散在各套试卷中<b>相同知识点</b>的题目集中展示，并配有生动讲解。每道题的<b>答案需点击“显示答案”后才会显示</b>，点击“查看详细解析”可看到该题涉及知识点的详细讲解。</div>';
  const cc = kpCounts();
  h += '<div class="summary" style="margin-top:18px"><b>知识点总览：</b>';
  cc.forEach(([id,c])=>{ h += '<span class="chip" onclick="showKP(\''+id+'\')">'+esc(kpName(id))+' <b>'+c+'</b></span>'; });
  h += '</div>';
  h += '<div class="home-grid">';
  h += '<div class="home-card"><div class="big">'+exams.length+'</div><div class="lbl">套历年真题试卷</div></div>';
  h += '<div class="home-card"><div class="big">'+totalQ+'</div><div class="lbl">道真题题目</div></div>';
  h += '<div class="home-card"><div class="big">'+cc.length+'</div><div class="lbl">个覆盖知识点</div></div>';
  h += '</div></div>';
  document.getElementById('main').innerHTML = h;
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

buildSidebar();
showHome();
</script>
</body>
</html>
